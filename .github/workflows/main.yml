name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'

      # حذف مجلد android الناقص
      - name: Remove incomplete android folder
        run: rm -rf android

      # إنشاء مشروع Android سليم (يحافظ على ملفاتنا لأنه لا يوجد مجلد android)
      - name: Create new Android project
        run: flutter create .

      # تثبيت الحزم
      - name: Get packages
        run: flutter pub get

      # بناء التطبيق
      - name: Build APK
        run: flutter build apk --debug

      # رفع ملف APK للتحميل
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
