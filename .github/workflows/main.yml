name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'

      # حذف مجلد android غير المكتمل (إن وُجد)
      - name: Remove incomplete android folder
        run: rm -rf android

      # إنشاء مشروع Android سليم باسم حزمة صالح
      - name: Create new Android project with valid package name
        run: flutter create . --project-name pdf_tools

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
